{% extends "base.html" %}
 
{% block title %}{{ 'Edit' if recipe else 'Add' }} Recipe | Gach Rud Ina Áit{% endblock %}
 
{% block content %}
 
<!-- PAGE HEADER
     Reused for both Add and Edit — title changes based on whether a recipe object is passed in -->
<section class="page-header">
    <div class="page-header__inner">
        <div>
            <p class="section__label">{{ 'Update an existing recipe' if recipe else 'Share something delicious' }}</p>
            <h1 class="page-header__heading">{{ 'Edit Recipe' if recipe else 'Add a Recipe' }}</h1>
        </div>
        <a href="{{ url_for('recipes') }}" class="back-link">
            <i class="fa-solid fa-arrow-left"></i> Back to Recipes
        </a>
    </div>
</section>

<!-- Recipe Form -->
<section class="form-section">
    <form class="recipe-form"
          method="POST"
          action="{{ url_for('edit_recipe', recipe_id=recipe.id) if recipe else url_for('add_recipe') }}">
 
        <!-- Title -->
        <div class="form-group">
            <label class="form-label" for="title">
                <i class="fa-solid fa-heading"></i> Recipe Title
            </label>
            <input
                type="text"
                id="title"
                name="title"
                class="form-input"
                placeholder="e.g. Spaghetti Carbonara"
                value="{{ recipe.title if recipe else '' }}"
                required
            />
        </div>
