{% extends "base.html" %}
 
{% block title %}{{ 'Edit' if recipe else 'Add' }} Recipe | Gach Rud Ina Áit{% endblock %}
 
{% block content %}
 
<!-- PAGE HEADER
     Reused for both Add and Edit — title changes based on whether a recipe object is passed in -->
<section class="page-header">
    <div class="page-header__inner">
        <div>
            <p class="section__label">{{ 'Update an existing recipe' if recipe else 'Share something delicious' }}</p>
            <h1 class="page-header__heading">{{ 'Edit Recipe' if recipe else 'Add a Recipe' }}</h1>
        </div>
        <a href="{{ url_for('recipes') }}" class="back-link">
            <i class="fa-solid fa-arrow-left"></i> Back to Recipes
        </a>
    </div>
</section>

<!-- Recipe Form -->
<section class="form-section">
    <form class="recipe-form"
          method="POST"
          action="{{ url_for('edit_recipe', recipe_id=recipe.id) if recipe else url_for('add_recipe') }}">
 
        <!-- Title -->
        <div class="form-group">
            <label class="form-label" for="title">
                <i class="fa-solid fa-heading"></i> Recipe Title
            </label>
            <input
                type="text"
                id="title"
                name="title"
                class="form-input"
                placeholder="e.g. Spaghetti Carbonara"
                value="{{ recipe.title if recipe else '' }}"
                required
            />
        </div>


        <!-- Category & Difficulty (side by side) -->
        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="category">
                    <i class="fa-solid fa-tag"></i> Category
                </label>
                <select id="category" name="category" class="form-input form-select">
                    {% for cat in ['Pasta', 'Curry', 'Salad', 'Breakfast', 'Mexican', 'Rice', 'Soup', 'Baking', 'Other'] %}
                        <option value="{{ cat }}"
                            {{ 'selected' if recipe and recipe.category == cat }}>
                            {{ cat }}
                        </option>
                    {% endfor %}
                </select>
            </div>
 
            <div class="form-group">
                <label class="form-label" for="difficulty">
                    <i class="fa-solid fa-signal"></i> Difficulty
                </label>
                <select id="difficulty" name="difficulty" class="form-input form-select">
                    {% for level in ['Easy', 'Medium', 'Hard'] %}
                        <option value="{{ level }}"
                            {{ 'selected' if recipe and recipe.difficulty == level }}>
                            {{ level }}
                        </option>
                    {% endfor %}
                </select>
            </div>
        </div>
